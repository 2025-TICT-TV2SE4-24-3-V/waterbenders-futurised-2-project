slam_toolbox:
  ros__parameters:
    use_sim_time: true
    base_frame: chassis
    odom_frame: odom
    map_frame: map
    scan_topic: /scan
    mode: mapping
    
    resolution: 0.1
    map_update_interval: 2.0
    transform_publish_period: 0.05
    
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
    
    max_laser_range: 10.0
    do_loop_closing: false
